<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超音波舌位動画データベース — Ultrasound Tongue DB</title>
  <meta name="description" content="超音波舌位画像データベース。音素・発話者・言語別に検索・閲覧可能。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
</head>
<body>

<!-- ====== HEADER ====== -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="logo">🔬 超音波舌位DB</h1>
      <span class="badge-count" id="header-count">0件</span>
    </div>
    <div class="header-right">
      <button class="btn btn-icon" onclick="exportData()" title="JSONエクスポート">📥 导出</button>
      <button class="btn btn-icon" onclick="document.getElementById('import-file').click()" title="JSONインポート">📤 导入</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-icon" id="admin-btn" onclick="toggleAdmin()" title="管理者モード">🔒 管理</button>
      <button class="btn btn-icon" onclick="toggleView()" id="view-toggle" title="表示切替">📋 表格</button>
    </div>
  </div>
</header>

<!-- ====== SEARCH BAR ====== -->
<div class="search-bar">
  <div class="search-inner">
    <input type="text" id="search-input" class="search-input" placeholder="🔍 検索... 音素 / 発話者 / タイトル / IPA / 備考" oninput="applyFilters()">
    <div class="filter-chips" id="active-filters"></div>
  </div>
</div>

<!-- ====== MAIN CONTENT ====== -->
<main class="main">

  <!-- TABLE VIEW -->
  <div id="table-view" class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th class="col-no">No.</th>
          <th class="col-title" onclick="sortBy('title')">タイトル <span class="sort-arrow"></span></th>
          <th class="col-phoneme" onclick="sortBy('phoneme')">音素 <span class="sort-arrow"></span></th>
          <th class="col-ipa">IPA</th>
          <th class="col-lang" onclick="sortBy('language')">言語 <span class="sort-arrow"></span></th>
          <th class="col-speaker" onclick="sortBy('speaker')">発話者 <span class="sort-arrow"></span></th>
          <th class="col-date" onclick="sortBy('date')">収録日 <span class="sort-arrow"></span></th>
          <th class="col-duration">時間</th>
          <th class="col-play">再生</th>
          <th class="col-actions admin-only" style="display:none;">操作</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="empty-row"><td colspan="10">データがありません。「管理」から動画を追加してください。</td></tr>
      </tbody>
    </table>
  </div>

  <!-- CARD VIEW -->
  <div id="card-view" class="card-grid" style="display:none;"></div>

</main>

<!-- ====== ADMIN PANEL ====== -->
<div id="admin-panel" class="admin-panel" style="display:none;">
  <div class="admin-header">
    <h2>🔧 管理パネル</h2>
    <button class="btn btn-sm" onclick="toggleAdmin()">閉じる</button>
  </div>

  <!-- Add/Edit Form -->
  <div class="admin-form" id="admin-form">
    <h3 id="form-title">➕ 動画を追加</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>タイトル *</label>
        <input type="text" id="form-title" class="input" placeholder="例：/a/ 日本語母音 話者A">
      </div>
      <div class="form-group">
        <label>音素（カンマ区切り）*</label>
        <input type="text" id="form-phoneme" class="input" placeholder="例：a, i, ɯ, e, o">
      </div>
      <div class="form-group">
        <label>IPA表記</label>
        <input type="text" id="form-ipa" class="input" placeholder="例：/a/, /i/, /ɯ/">
      </div>
      <div class="form-group">
        <label>言語</label>
        <select id="form-language" class="input">
          <option value="ja">日本語</option>
          <option value="zh">中国語</option>
          <option value="en">英語</option>
          <option value="ko">韓国語</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>発話者</label>
        <input type="text" id="form-speaker" class="input" placeholder="例：話者A（女性・20代）">
      </div>
      <div class="form-group">
        <label>収録日</label>
        <input type="date" id="form-date" class="input">
      </div>
      <div class="form-group full-width">
        <label>動画ファイル</label>
        <div class="file-area">
          <input type="file" id="form-file" accept="video/*,.mp4,.avi,.mov,.webm" class="file-input-hidden">
          <label for="form-file" class="file-drop-zone">
            <span id="file-name">クリックして動画を選択（またはドラッグ＆ドロップ）</span>
          </label>
        </div>
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">またはURL</p>
        <input type="text" id="form-url" class="input" placeholder="https://... または /path/to/video.mp4">
      </div>
      <div class="form-group full-width">
        <label>備考</label>
        <textarea id="form-notes" class="input" rows="2" placeholder="超音波プローブ位置、フレームレート、実験条件など"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <input type="hidden" id="form-edit-id" value="">
      <button class="btn btn-primary" onclick="saveEntry()">💾 保存</button>
      <button class="btn" onclick="cancelEdit()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ====== VIDEO PLAYER MODAL ====== -->
<div class="modal" id="player-modal" style="display:none;">
  <div class="modal-backdrop" onclick="closePlayer()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closePlayer()">✕</button>
    <video id="player-video" controls style="width:100%;max-height:65vh;border-radius:8px;background:#000;"></video>
    <div id="player-info" class="player-info"></div>
  </div>
</div>

<!-- ====== PASSWORD MODAL ====== -->
<div class="modal" id="password-modal" style="display:none;">
  <div class="modal-backdrop"></div>
  <div class="modal-content modal-sm">
    <h3 style="margin-bottom:16px;">🔐 管理者認証</h3>
    <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px;">データベースを編集するにはパスワードを入力してください。</p>
    <input type="password" id="admin-password" class="input" placeholder="パスワード" style="margin-bottom:12px;" onkeydown="if(event.key==='Enter')verifyAdmin()">
    <div class="form-actions">
      <button class="btn btn-primary" onclick="verifyAdmin()">認証</button>
      <button class="btn" onclick="closePasswordModal()">キャンセル</button>
    </div>
    <p id="password-error" style="color:#ef4444;font-size:0.8rem;margin-top:8px;display:none;">パスワードが違います。</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
