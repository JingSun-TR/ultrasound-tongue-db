<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超音波舌位動画データベース — Ultrasound Tongue DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="logo">🔬 超音波舌位DB</h1>
      <span class="badge-count" id="header-count">0件</span>
    </div>
    <div class="header-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="ja" onclick="switchLang('ja')">🇯🇵 日</button>
        <button class="lang-btn" data-lang="zh" onclick="switchLang('zh')">🇨🇳 中</button>
        <button class="lang-btn" data-lang="en" onclick="switchLang('en')">🇬🇧 EN</button>
      </div>
      <button class="btn btn-icon" onclick="toggleView()" id="view-toggle">📋 表格</button>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-inner">
    <input type="text" id="search-input" class="search-input" placeholder="🔍 検索... 音素 / 発話者 / タイトル / IPA" oninput="applyFilters()">
    <div class="filter-chips" id="active-filters"></div>
  </div>
</div>

<main class="main">
  <div id="table-view" class="table-container">
    <table>
      <thead><tr>
        <th class="col-no">#</th>
        <th class="col-title">タイトル</th>
        <th class="col-phoneme">音素</th>
        <th class="col-lang">言語</th>
        <th class="col-speaker">発話者</th>
        <th class="col-date">収録日</th>
        <th class="col-play">再生</th>
      </tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div id="card-view" class="card-grid" style="display:none"></div>
</main>

<div class="modal" id="player-modal" style="display:none">
  <div class="modal-backdrop" onclick="closePlayer()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closePlayer()">✕</button>
    <video id="player-video" controls style="width:100%;max-height:65vh;border-radius:8px;background:#000"></video>
    <div id="player-info" class="player-info"></div>
  </div>
</div>

<script>
// ====== State ======
let allVideos = [];
let currentView = 'table';

// ====== Load Data ======
async function loadData() {
  try {
    const resp = await fetch('data/videos.json');
    allVideos = await resp.json();
    document.getElementById('header-count').textContent = allVideos.length + '件';
    applyFilters();
  } catch(e) {
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="7" style="text-align:center;padding:40px;color:#f66">データ読み込み失敗: ' + e.message + '</td></tr>';
  }
}

// ====== Render ======
function applyFilters() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  let filtered = allVideos;
  if (q) {
    const terms = q.split(/\s+/).filter(Boolean);
    filtered = allVideos.filter(v => {
      const s = [v.title, v.phoneme, v.ipa, v.speaker, v.language, v.date]
        .filter(Boolean).join(' ').toLowerCase();
      return terms.every(t => s.includes(t));
    });
  }
  // Sort by language then title
  filtered.sort((a,b) => {
    if (a.language !== b.language) return a.language === 'ja' ? -1 : 1;
    return (a.title||'').localeCompare(b.title||'');
  });

  if (currentView === 'table') renderTable(filtered);
  else renderCards(filtered);
}

function renderTable(videos) {
  const tbody = document.getElementById('table-body');
  if (!videos.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888">データなし</td></tr>';
    return;
  }
  tbody.innerHTML = videos.map((v, i) => {
    const langLabel = {ja:'日本語',zh:'中国語',en:'英語',ko:'韓国語'}[v.language] || v.language;
    const hasVideo = !!v.videoUrl;
    return '<tr>' +
      '<td>' + (i+1) + '</td>' +
      '<td>' + esc(v.title||'') + '</td>' +
      '<td>' + esc(v.phoneme||'') + '</td>' +
      '<td>' + langLabel + '</td>' +
      '<td>' + esc(v.speaker||'') + '</td>' +
      '<td>' + (v.date||'') + '</td>' +
      '<td>' + (hasVideo
        ? '<button class="play-btn" onclick="event.stopPropagation();playVideo(' + v.id + ')">▶</button>'
        : '<span style="color:#888;font-size:12px">-</span>') +
      '</td>' +
    '</tr>';
  }).join('');
}

function renderCards(videos) {
  const grid = document.getElementById('card-view');
  if (!videos.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#888">データなし</div>';
    return;
  }
  grid.innerHTML = videos.map(v => {
    const langLabel = {ja:'日本語',zh:'中国語',en:'英語',ko:'韓国語'}[v.language] || v.language;
    const hasVideo = !!v.videoUrl;
    return '<div class="video-card"' + (hasVideo ? ' onclick="playVideo(' + v.id + ')"' : '') + '>' +
      '<div class="video-thumb">' +
        (hasVideo
          ? '<video src="' + esc(v.videoUrl) + '#t=0.1" preload="metadata" muted style="width:100%;height:100%;object-fit:cover"></video>' +
            '<span class="play-icon-overlay">▶</span>'
          : '<span style="display:flex;align-items:center;justify-content:center;height:100%;color:#888">📹</span>') +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-title">' + esc(v.title||'無題') + '</div>' +
        '<div class="card-tags"><span class="phoneme-tag">' + esc(v.phoneme||'') + '</span></div>' +
        '<div style="font-size:0.75rem;color:#888;margin-top:4px">' +
          langLabel + ' · ' + esc(v.speaker||'') + ' · ' + (v.date||'') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ====== Play ======
function playVideo(id) {
  const numId = parseInt(id);
  const video = allVideos.find(v => v.id === numId);
  if (!video || !video.videoUrl) return;

  const player = document.getElementById('player-video');
  player.src = video.videoUrl;
  player.style.display = '';

  document.getElementById('player-info').innerHTML =
    '<h3>' + esc(video.title||'') + '</h3>' +
    '<div class="player-meta">' +
      '<span class="phoneme-tag">🔤 ' + esc(video.phoneme) + '</span>' +
      '<span class="phoneme-tag">🌐 ' + ({ja:'日本語',zh:'中国語'}[video.language]||video.language) + '</span>' +
      '<span class="phoneme-tag">👤 ' + esc(video.speaker||'') + '</span>' +
      '<span class="phoneme-tag">📅 ' + (video.date||'') + '</span>' +
    '</div>';

  document.getElementById('player-modal').style.display = 'flex';
  player.play().catch(() => {});
}

function closePlayer() {
  document.getElementById('player-modal').style.display = 'none';
  const p = document.getElementById('player-video');
  p.pause(); p.src = '';
}

// ====== View Toggle ======
function toggleView() {
  currentView = currentView === 'table' ? 'cards' : 'table';
  document.getElementById('table-view').style.display = currentView === 'table' ? '' : 'none';
  document.getElementById('card-view').style.display = currentView === 'cards' ? '' : 'none';
  document.getElementById('view-toggle').textContent = currentView === 'table' ? '📋 表格' : '🃏 卡片';
  applyFilters();
}

// ====== Language ======
let currentLang = 'ja';
function switchLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  applyFilters();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ====== Init ======
loadData();
</script>

</body>
</html>
