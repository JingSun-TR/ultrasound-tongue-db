<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超声波舌位视频数据库 — Ultrasound Tongue DB</title>
  <meta name="description" content="超声波舌位视频数据库。存储、分类、检索、播放超声波舌位影像。支持按音素、语言、发音人筛选。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">🔬 超声波舌位数据库</a>
      <div class="nav-actions">
        <button class="btn btn-sm" onclick="document.getElementById('upload-section').scrollIntoView()">📤 上传视频</button>
      </div>
    </div>
  </nav>

  <main class="main">
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat"><span class="stat-num" id="total-videos">0</span> 视频</div>
      <div class="stat"><span class="stat-num" id="total-phonemes">0</span> 音素</div>
      <div class="stat"><span class="stat-num" id="total-speakers">0</span> 发音人</div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label>🔤 音素</label>
        <select id="filter-phoneme"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <label>🗣 语言</label>
        <select id="filter-language">
          <option value="">全部</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="filter-group">
        <label>👤 发音人</label>
        <select id="filter-speaker"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <label>📅 日期</label>
        <input type="date" id="filter-date">
      </div>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="video-grid">
      <div class="empty-state">
        <div class="empty-icon">📹</div>
        <h3>暂无视频</h3>
        <p>点击上方「上传视频」按钮添加超声波影像</p>
      </div>
    </div>

    <!-- Upload Section -->
    <section id="upload-section" class="upload-section">
      <h2>📤 添加视频</h2>
      <div class="upload-card">
        <div class="form-grid">
          <div class="form-group">
            <label>视频标题 *</label>
            <input type="text" id="upload-title" class="input" placeholder="例：/a/ 日本語母音 発音者A">
          </div>
          <div class="form-group">
            <label>音素 (IPA) *</label>
            <input type="text" id="upload-phoneme" class="input" placeholder="例：a, i, ɯ, e, o">
          </div>
          <div class="form-group">
            <label>语言</label>
            <select id="upload-language" class="input">
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>发音人</label>
            <input type="text" id="upload-speaker" class="input" placeholder="例：Speaker A">
          </div>
          <div class="form-group">
            <label>记录日期</label>
            <input type="date" id="upload-date" class="input">
          </div>
          <div class="form-group">
            <label>视频文件</label>
            <div class="file-input-wrapper">
              <input type="file" id="upload-file" accept="video/*" class="file-input">
              <label for="upload-file" class="file-label">选择视频文件</label>
            </div>
            <p style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">或输入视频链接（YouTube / 本地路径）</p>
            <input type="text" id="upload-url" class="input" placeholder="https://... 或 /path/to/video.mp4" style="margin-top:8px;">
          </div>
          <div class="form-group">
            <label>备注</label>
            <textarea id="upload-notes" class="input" rows="2" placeholder="探头位置、帧率、实验条件等"></textarea>
          </div>
        </div>
        <button class="btn btn-primary" onclick="addVideo()">✅ 添加到数据库</button>
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;">视频数据保存在浏览器本地存储中（IndexedDB）</p>
      </div>
    </section>

    <!-- Video Player Modal -->
    <div class="modal" id="player-modal" style="display:none;">
      <div class="modal-backdrop" onclick="closePlayer()"></div>
      <div class="modal-content">
        <button class="modal-close" onclick="closePlayer()">✕</button>
        <video id="player-video" controls style="width:100%;max-height:70vh;border-radius:8px;"></video>
        <div id="player-info" class="player-info"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>超声波舌位视频数据库 · 语音学研究工具</p>
    <p><a href="https://github.com/JingSun-TR/ultrasound-tongue-db">GitHub</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
