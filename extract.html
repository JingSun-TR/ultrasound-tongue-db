<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Video Extractor</title>
<style>
body{font-family:monospace;padding:20px;background:#111;color:#0f0}
pre{background:#222;padding:15px;overflow:auto;max-height:500px}
a{color:#ff0;font-weight:bold;font-size:16px}
</style></head><body>
<h2>Ultrasound DB — Auto Video Extractor (ZIP)</h2>
<pre id="log">Loading JSZip + opening IndexedDB...</pre>
<div id="links"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const log = (msg) => { document.getElementById('log').textContent += '\n' + msg; };

(async () => {
  try {
    const req = indexedDB.open('ultrasound-tongue-db-v3', 2);
    req.onsuccess = async (e) => {
      const db = e.target.result;
      const store = db.transaction('videos','readonly').objectStore('videos');
      const getAll = store.getAll();
      
      getAll.onsuccess = async () => {
        const allVideos = getAll.result;
        log('Found ' + allVideos.length + ' entries');
        
        const zip = new JSZip();
        const videosFolder = zip.folder('videos');
        const exportData = [];
        
        for (let i = 0; i < allVideos.length; i++) {
          const v = allVideos[i];
          const { videoData, ...meta } = v;
          
          const safe = (v.title || 'video').replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_').substring(0, 30);
          const ext = (videoData && videoData.type === 'video/webm') ? 'webm' : 'mp4';
          const filename = safe + '_' + (v.date || 'nodate') + '.' + ext;
          
          if (videoData && videoData instanceof Blob && videoData.size > 0) {
            meta.videoUrl = 'videos/' + filename;
            meta.videoPath = filename;
            videosFolder.file(filename, videoData);
            log('[' + (i+1) + '/' + allVideos.length + '] ' + filename + ' (' + (videoData.size/1024).toFixed(1) + ' KB)');
          } else {
            meta.videoUrl = v.videoUrl || '';
            meta.videoPath = v.videoPath || '';
            log('[' + (i+1) + '/' + allVideos.length + '] No blob: ' + (v.title || 'untitled'));
          }
          
          exportData.push(meta);
        }
        
        // Add updated JSON to ZIP
        const json = JSON.stringify(exportData, null, 2);
        zip.file('videos.json', json);
        
        log('\nGenerating ZIP...');
        const zipBlob = await zip.generateAsync({type: 'blob'}, (meta) => {
          if (meta.percent % 20 === 0) log('  ' + meta.percent.toFixed(0) + '%');
        });
        
        log('ZIP size: ' + (zipBlob.size/1024/1024).toFixed(1) + ' MB');
        log('\nDOWNLOADING...');
        
        // Trigger single download
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ultrasound-videos.zip';
        a.textContent = '>>> CLICK HERE TO DOWNLOAD ZIP <<<';
        a.style.cssText = 'color:#ff0;font-weight:bold;font-size:18px;display:block;margin:10px 0';
        document.getElementById('links').appendChild(a);
        a.click();
        
        log('DONE! Unzip and place videos/ folder + videos.json into the repo.');
      };
    };
    req.onerror = () => { log('ERROR: ' + req.error); };
  } catch(e) { log('FATAL: ' + e.message); }
})();
</script>
</body></html>
