<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Video Extractor</title>
<style>
body{font-family:monospace;padding:20px;background:#111;color:#0f0}
pre{background:#222;padding:15px;overflow:auto;max-height:500px}
a{color:#0ff;display:block;margin:4px 0}
</style></head><body>
<h2>Ultrasound DB — Auto Video Extractor</h2>
<pre id="log">Opening IndexedDB...</pre>
<div id="links"></div>
<script>
const log = (msg) => { document.getElementById('log').textContent += '\n' + msg; };

(async () => {
  try {
    const req = indexedDB.open('ultrasound-tongue-db-v3', 2);
    req.onsuccess = async (e) => {
      const db = e.target.result;
      const store = db.transaction('videos','readonly').objectStore('videos');
      const getAll = store.getAll();
      
      getAll.onsuccess = async () => {
        const allVideos = getAll.result;
        log('Found ' + allVideos.length + ' entries');
        
        const exportData = [];
        const linksDiv = document.getElementById('links');
        
        for (let i = 0; i < allVideos.length; i++) {
          const v = allVideos[i];
          const { videoData, ...meta } = v;
          
          const safe = (v.title || 'video').replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_').substring(0, 30);
          const ext = (videoData && videoData.type === 'video/webm') ? 'webm' : 'mp4';
          const filename = safe + '_' + (v.date || 'nodate') + '.' + ext;
          
          if (videoData && videoData instanceof Blob && videoData.size > 0) {
            meta.videoUrl = 'videos/' + filename;
            meta.videoPath = filename;
            
            // Trigger download
            const blob = new Blob([videoData], {type: videoData.type || 'video/mp4'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            linksDiv.appendChild(a);
            a.click();
            
            log('[' + (i+1) + '/' + allVideos.length + '] Saved: ' + filename + ' (' + (blob.size/1024).toFixed(1) + ' KB)');
            await new Promise(r => setTimeout(r, 500));
          } else {
            meta.videoUrl = v.videoUrl || '';
            meta.videoPath = v.videoPath || '';
            log('[' + (i+1) + '/' + allVideos.length + '] No blob: ' + (v.title || 'untitled') + ' (using existing path)');
          }
          
          exportData.push(meta);
        }
        
        // Download updated JSON last
        const json = JSON.stringify(exportData, null, 2);
        const jsonBlob = new Blob([json], {type:'application/json'});
        const jsonUrl = URL.createObjectURL(jsonBlob);
        const a2 = document.createElement('a');
        a2.href = jsonUrl;
        a2.download = 'videos.json';
        a2.style.color = '#ff0';
        a2.style.fontWeight = 'bold';
        a2.textContent = '>>> DOWNLOAD: videos.json (updated metadata) <<<';
        linksDiv.insertBefore(a2, linksDiv.firstChild);
        setTimeout(() => a2.click(), 1000);
        
        log('\nDONE! ' + exportData.length + ' entries processed.');
        log('Move all .mp4/.webm files to videos/ folder.');
        log('Replace data/videos.json with the downloaded one.');
      };
    };
    req.onerror = () => { log('ERROR: ' + req.error); };
  } catch(e) { log('FATAL: ' + e.message); }
})();
</script>
</body></html>
