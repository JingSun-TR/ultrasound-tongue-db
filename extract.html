<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Video Extractor v2</title>
<style>
body{font-family:system-ui;background:#111;color:#fff;padding:20px}
.video-row{display:flex;align-items:center;gap:12px;padding:10px;margin:4px 0;background:#222;border-radius:6px}
.video-row .title{flex:1;min-width:120px}
.video-row .size{color:#888;font-size:13px;min-width:70px}
.video-row .status{color:#ff0;font-size:13px;min-width:80px}
button{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px}
.btn-dl{background:#0a0;color:#fff}
.btn-dl:hover{background:#0c0}
.btn-zip{background:#f90;color:#000;padding:12px 30px;font-size:16px;margin:10px 0}
.btn-zip:hover{background:#fa0}
.no-blob{background:#555;color:#999}
</style></head><body>
<h2>Ultrasound DB — Video Extractor v2</h2>
<p id="summary">Opening IndexedDB...</p>
<button id="zip-all" class="btn-zip" style="display:none" onclick="downloadZip()">Download All as ZIP</button>
<div id="list"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let entries = [];

(async () => {
  const req = indexedDB.open('ultrasound-tongue-db-v3', 2);
  req.onsuccess = async (e) => {
    const store = e.target.result.transaction('videos','readonly').objectStore('videos');
    entries = (await new Promise(r => { const g = store.getAll(); g.onsuccess = () => r(g.result); }));
    
    let blobCount = 0;
    const list = document.getElementById('list');
    
    for (let i = 0; i < entries.length; i++) {
      const v = entries[i];
      const hasBlob = v.videoData && v.videoData instanceof Blob && v.videoData.size > 100;
      if (hasBlob) blobCount++;
      
      const row = document.createElement('div');
      row.className = 'video-row';
      row.innerHTML = 
        '<span class="title">' + (i+1) + '. ' + (v.title || '?') + '</span>' +
        '<span class="size">' + (hasBlob ? (v.videoData.size/1024).toFixed(0)+'KB' : '-') + '</span>' +
        '<span class="status">' + (hasBlob ? '✅ blob ok' : '❌ no blob') + '</span>' +
        '<button class="btn-dl' + (hasBlob ? '' : ' no-blob') + '" ' + (hasBlob ? 'onclick="downloadOne('+i+')"' : 'disabled') + '>Download</button>';
      list.appendChild(row);
    }
    
    document.getElementById('summary').textContent = 
      entries.length + ' entries, ' + blobCount + ' with video blobs';
    
    if (blobCount > 0) {
      document.getElementById('zip-all').style.display = 'inline-block';
    }
  };
  req.onerror = () => { document.getElementById('summary').textContent = 'ERROR: ' + req.error; };
})();

function downloadOne(i) {
  const v = entries[i];
  if (!v.videoData) return;
  const safe = (v.title||'video').replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g,'_').substring(0,30);
  const ext = v.videoData.type === 'video/webm' ? 'webm' : 'mp4';
  const fn = safe + '_' + (v.date||'x') + '.' + ext;
  const url = URL.createObjectURL(v.videoData);
  const a = document.createElement('a');
  a.href = url; a.download = fn; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function downloadZip() {
  const btn = document.getElementById('zip-all');
  btn.disabled = true; btn.textContent = 'Building ZIP...';
  
  const zip = new JSZip();
  const vf = zip.folder('videos');
  let count = 0;
  
  for (const v of entries) {
    if (v.videoData && v.videoData.size > 100) {
      const blob = v.videoData;
      const safe = (v.title||'video').replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g,'_').substring(0,30);
      const ext = blob.type === 'video/webm' ? 'webm' : 'mp4';
      const fn = safe + '_' + (v.date||'x') + '.' + ext;
      vf.file(fn, blob);
      count++;
    }
  }
  
  btn.textContent = 'Generating ZIP (' + count + ' files)...';
  const zipBlob = await zip.generateAsync({type:'blob'});
  btn.textContent = 'Downloading ' + (zipBlob.size/1024/1024).toFixed(1) + 'MB...';
  
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ultrasound-videos.zip'; a.click();
  
  btn.textContent = 'Done! Check Downloads';
}
</script>
</body></html>
