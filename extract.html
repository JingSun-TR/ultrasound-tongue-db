<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Video Extractor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#111;color:#fff;padding:20px;text-align:center}
#status{padding:20px;font-size:18px;color:#0f0}
#dl-btn{display:none;padding:20px 40px;font-size:20px;background:#ff0;color:#000;border:none;border-radius:8px;cursor:pointer;margin:20px;font-weight:bold}
#dl-btn:hover{background:#ff0;box-shadow:0 0 20px #ff0}
pre{background:#222;padding:15px;text-align:left;max-height:300px;overflow:auto;margin:20px auto;max-width:700px}
</style></head><body>
<h2>Ultrasound DB — Video Extractor</h2>
<div id="status">Loading...</div>
<button id="dl-btn">DOWNLOAD ZIP</button>
<pre id="log"></pre>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
  onerror="document.getElementById('status').textContent='JSZip failed to load. Check internet.'"></script>
<script>
const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

window.onload = function() {
  setTimeout(async () => {
    document.getElementById('status').textContent = 'Opening IndexedDB...';
    try {
      const req = indexedDB.open('ultrasound-tongue-db-v3', 2);
      req.onsuccess = async (e) => {
        const store = e.target.result.transaction('videos','readonly').objectStore('videos');
        const getAll = store.getAll();
        getAll.onsuccess = async () => {
          const all = getAll.result;
          document.getElementById('status').textContent = 'Found ' + all.length + ' entries. Building ZIP...';
          
          const zip = new JSZip();
          const vf = zip.folder('videos');
          const exp = [];
          let blobCount = 0;
          
          for (const v of all) {
            const {videoData, ...meta} = v;
            if (videoData && videoData.size > 0) {
              const safe = (v.title||'video').replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g,'_').substring(0,30);
              const ext = videoData.type==='video/webm'?'webm':'mp4';
              const fn = safe + '_' + (v.date||'x') + '.' + ext;
              vf.file(fn, videoData);
              meta.videoUrl = 'videos/' + fn;
              meta.videoPath = fn;
              blobCount++;
              log('Video: ' + fn + ' (' + (videoData.size/1024).toFixed(0) + 'KB)');
            }
            exp.push(meta);
          }
          
          zip.file('videos.json', JSON.stringify(exp,null,2));
          log('Metadata: ' + exp.length + ' entries, ' + blobCount + ' videos');
          
          const zipBlob = await zip.generateAsync({type:'blob'});
          document.getElementById('status').textContent = 
            'ZIP ready: ' + (zipBlob.size/1024/1024).toFixed(1) + 'MB (' + blobCount + ' videos)';
          document.getElementById('dl-btn').style.display = 'inline-block';
          document.getElementById('dl-btn').onclick = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(zipBlob);
            a.download = 'ultrasound-videos.zip';
            a.click();
          };
        };
      };
      req.onerror = () => { document.getElementById('status').textContent = 'ERROR: ' + req.error; };
    } catch(e) { document.getElementById('status').textContent = 'ERROR: ' + e; }
  }, 500);
};
</script>
<p style="margin-top:20px;color:#888;font-size:14px">1. Wait for ZIP to build → 2. Click DOWNLOAD → 3. Save file</p>
</body></html>
